[General]
; Adds only a runtime 3D bounds patch for Skyrim's ShockBoltAimStorm projectile.
; Storm Call Shout Overhaul's targeting, timing, damage, and Papyrus behavior are otherwise unchanged.
bEnable=1
bPatchProjectileBounds=1
bForceProjectileAlwaysDraw=1

[Visual]
; Larger values make the true Storm Call lightning projectile less likely to be camera-frustum culled.
fProjectileBoundRadius=18000.0
